name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Generate tag
        run: echo "TAG=dev-$(date +'%Y-%m-%d').${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t aysebeyaz/todo-app:$TAG ./app
          docker build -t aysebeyaz/todo-app:latest ./app

      - name: Push image
        run: |
          docker push aysebeyaz/todo-app:$TAG
          docker push aysebeyaz/todo-app:latest